  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6380:6379"
    networks:
      - appnet

  agent_server:
    build: ./agent_server
    depends_on:
      - redis
    env_file:
      - ".env"
    ports:
      - "8000:8000"
    volumes:
      - ./secrets:/app/secrets:ro
      - /opt/stack/:/opt/stack:ro
    networks:
      - appnet

volumes:
  postgres_data:

networks:
  appnet:
    driver: bridge