<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Agent Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 16px; }
    h1 { font-size: 1.2rem; color: #333; }
    #history {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      min-height: 400px;
      max-height: 600px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 85%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.agent { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { background: #4f8ef7; color: #fff; border-bottom-right-radius: 4px; }
    .msg.agent .bubble { background: #e8e8e8; color: #222; border-bottom-left-radius: 4px; }
    .label { font-size: 0.72rem; color: #999; padding: 0 4px; }
    .typing .bubble { color: #888; font-style: italic; }
    .input-row { display: flex; gap: 8px; }
    textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      height: 52px;
      line-height: 1.4;
    }
    textarea:focus { border-color: #4f8ef7; }
    button {
      padding: 0 20px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button:disabled { background: #b0c4f7; cursor: not-allowed; }
    .empty-hint { color: #bbb; font-size: 0.85rem; align-self: center; margin-top: auto; margin-bottom: auto; }
  </style>
</head>
<body>
<div class="container">
  <h1>Agent Test UI</h1>
  <div id="history">
    <span class="empty-hint">메시지를 입력하세요</span>
  </div>
  <div class="input-row">
    <textarea id="input" placeholder="질문을 입력하세요 (Shift+Enter로 전송)" rows="1"></textarea>
    <button id="sendBtn" onclick="send()">전송</button>
  </div>
</div>

<script>
  const history = document.getElementById('history');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); send(); }
  });

  function appendMsg(role, text) {
    const empty = history.querySelector('.empty-hint');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = role === 'user' ? '나' : 'Agent';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    div.appendChild(label);
    div.appendChild(bubble);
    history.appendChild(div);
    history.scrollTop = history.scrollHeight;
    return bubble;
  }

  async function send() {
    const msg = input.value.trim();
    if (!msg || sendBtn.disabled) return;

    input.value = '';
    sendBtn.disabled = true;
    appendMsg('user', msg);

    const typingDiv = document.createElement('div');
    typingDiv.className = 'msg agent typing';
    typingDiv.innerHTML = '<span class="label">Agent</span><div class="bubble">응답 중...</div>';
    history.appendChild(typingDiv);
    history.scrollTop = history.scrollHeight;

    try {
      const res = await fetch('/ai/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
      });
      const data = await res.json();
      typingDiv.remove();
      appendMsg('agent', data.result ?? JSON.stringify(data));
    } catch (e) {
      typingDiv.remove();
      appendMsg('agent', `오류: ${e.message}`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
